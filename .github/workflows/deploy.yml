name: Deploy static content to Pages

on:
  # mainブランチにプッシュされた時に実行します（masterブランチを使用している場合は 'main' を 'master' に変更してください）
  push:
    branches: ["main"]
  # 手動でアクションを実行できるようにします
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 複数同時にデプロイが走らないように制御します
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリのルートディレクトリにあるファイルをアップロードします
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
